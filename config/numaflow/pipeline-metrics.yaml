# PodMonitor so Prometheus (kube-prometheus-stack) scrapes pipeline vertex pod metrics.
# Scrapes all containers with a port named "metrics" (platform + user-defined), not just Service ports.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    app.kubernetes.io/part-of: perfman
    release: perfman-kube-prometheus
  name: perfman-numaflow-pipeline-metrics
spec:
  podMetricsEndpoints:
    - path: /metrics
      port: metrics
      interval: 15s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
  selector:
    matchLabels:
      app.kubernetes.io/component: vertex
      app.kubernetes.io/managed-by: vertex-controller
      app.kubernetes.io/part-of: numaflow
    matchExpressions:
      - key: numaflow.numaproj.io/pipeline-name
        operator: Exists
      - key: numaflow.numaproj.io/vertex-name
        operator: Exists
