# PodMonitor so Prometheus (kube-prometheus-stack) scrapes MonoVertex pod metrics.
# Deploy to the same namespace as perfman so the release label is selected.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    app.kubernetes.io/part-of: perfman
    release: perfman-kube-prometheus
  name: perfman-numaflow-monovertex-metrics
spec:
  podMetricsEndpoints:
    # MonoVertex pods run several containers (udsource, transformer, udf, udsink, …), each possibly
    # exposing port "metrics" → duplicate series per pod. Keep only CtrMain ("numa") targets.
    # Use relabelings (not spec.container) for older prometheus-operator CRDs that reject `container`.
    - path: /metrics
      port: metrics
      interval: 15s
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
      relabelings:
        - action: keep
          sourceLabels: [__meta_kubernetes_pod_container_name]
          regex: numa
  selector:
    matchLabels:
      app.kubernetes.io/component: mono-vertex
      app.kubernetes.io/managed-by: mono-vertex-controller
      app.kubernetes.io/part-of: numaflow
    matchExpressions:
      - key: numaflow.numaproj.io/mono-vertex-name
        operator: Exists
